[tool.black]
line-length = 100

[tool.poetry]
name = "brainshare-backend"
version = "0.1.0"
description = ""
authors = ["Zachary King <zaking17@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
asyncpg = "^0.27.0"
celery = { extras = ["redis"], version = "^5.2.7" }
fastapi = "^0.104.1"
sqlalchemy = { extras = ["asyncio", "mypy"], version = "^2.0.23" }
sqlmodel = "^0.0.12"
tiktoken = "^0.3.1"
uvicorn = { extras = ["standard"], version = "^0.21.0" }
openai = "^0.27.10"
numpy = "^1.24.2"
pgvector = "^0.1.6"
httpx = "^0.24.0"
fuzzysearch = "^0.7.3"
glom = "^23.3.0"
supabase = "^2.1.0"
gotrue = "^1.3.0"
backoff = "^2.2.1"
google-api-python-client = "^2.107.0"
google-auth-httplib2 = "^0.1.1"
google-auth-oauthlib = "^1.1.0"
pypdfium2 = "^4.24.0"
langchain = "^0.0.343"
pandas = "^2.2.1"

[tool.poetry.group.testing.dependencies]
pytest = "^7.2.2"
pytest-asyncio = "^0.20.3"

[tool.poetry.group.dev.dependencies]
psycopg2-binary = "^2.9.6" # for codegen
httpie = "^3.2.1"
mypy = "^1.1.1"
black = "^23.1.0"
ipykernel = "^6.21.3"
types-redis = "^4.5.4.1"
celery-types = "^0.18.0"
#
sqlacodegen = { git = "https://github.com/agronholm/sqlacodegen", branch = "master" }

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
